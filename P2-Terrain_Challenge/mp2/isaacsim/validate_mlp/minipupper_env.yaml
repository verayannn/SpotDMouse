# Environment configuration for Mini Pupper policy
decimation: 4  # Typical for 50Hz policy with 200Hz physics
action_scale: 0.5
num_observations: 59  # 3+3+2+3+12+12+12+12 = 59
num_actions: 12

# Default joint positions (45 degree configuration)
default_joint_pos:
  - 0.0    # base_lf1
  - 0.785  # lf1_lf2 (45°)
  - -1.57  # lf2_lf3 (-90°)
  - 0.0    # base_rf1
  - 0.785  # rf1_rf2
  - -1.57  # rf2_rf3
  - 0.0    # base_lb1
  - 0.785  # lb1_lb2
  - -1.57  # lb2_lb3
  - 0.0    # base_rb1
  - 0.785  # rb1_rb2
  - -1.57  # rb2_rb3